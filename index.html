<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cricket Stream Overlay</title>
  <style>
    body, html {
      margin: 0; padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .scoreboard-strip {
      position: absolute;
      bottom: 25px;
      left: 25px;
      display: flex;
      align-items: center;
      background: rgba(15, 23, 42, 0.95);
      color: #ffffff;
      border-radius: 4px;
      padding: 10px 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
      border-left: 5px solid #eab308;
    }
    .team {
      font-weight: 800;
      font-size: 18px;
      margin-right: 15px;
      letter-spacing: 0.5px;
    }
    .score {
      font-weight: 800;
      font-size: 24px;
      color: #eab308;
    }
    .overs {
      font-size: 16px;
      color: #94a3b8;
      margin-left: 10px;
    }
    .equation {
      font-size: 14px;
      color: #f87171;
      margin-left: 15px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="scoreboard-strip">
    <div id="team" class="team"></div>
    <div id="score" class="score"></div>
    <div id="overs" class="overs"></div>
    <div id="equation" class="equation"></div>
  </div>

  <script>
    const CRICCLUBS_URL = 'https://cricclubs.com/ARCL/ballbyball.do?matchId=13906&clubId=992';
    // Using a reliable public proxy to bypass Vercel serverless routing and browser CORS blocks completely
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(CRICCLUBS_URL);

    async function refreshScore() {
      try {
        const res = await fetch(PROXY_URL);
        if (!res.ok) return;
        
        const htmlText = await res.text();
        
        // Use the browser's native DOM parser to read the exact HTML structure you shared
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');

        // 1. Extract Team Spans
        const teamElements = doc.querySelectorAll('.teamName');
        let teams = [];
        teamElements.forEach(el => {
          teams.push(el.textContent.trim());
        });

        // 2. Extract Scores (filtering out spans that contain letters or titles)
        const spanElements = doc.querySelectorAll('.vsteam-image span');
        let scores = [];
        spanElements.forEach(el => {
          const text = el.textContent.trim();
          if (/\d+\s*\/\s*\d+/.test(text)) {
            scores.push(text);
          }
        });

        // 3. Extract Overs
        const pElements = doc.querySelectorAll('.vsteam-image p');
        let overs = [];
        pElements.forEach(el => {
          const text = el.textContent.replace(/\s+/g, ' ').trim();
          const currentOver = text.split('/')[0].trim();
          if (currentOver) {
            overs.push(currentOver);
          }
        });

        // 4. Extract Target Match Equation Banner
        const h3Element = doc.querySelector('h3');
        const targetText = h3Element ? h3Element.textContent.replace(/\s+/g, ' ').trim() : "";

        // Determine context layout: check if Innings 2 is running
        let activeTeam = "";
        let activeScore = "";
        let activeOver = "";

        if (scores.length >= 2) {
          activeTeam = teams[1];
          activeScore = scores[1];
          activeOver = overs[1];
        } else if (scores.length === 1) {
          activeTeam = teams[0];
          activeScore = scores[0];
          activeOver = overs[0];
        }

        // Render directly onto your layout screen
        if (activeTeam || activeScore) {
          document.getElementById('team').innerText = activeTeam ? activeTeam.toUpperCase() : "";
          document.getElementById('score').innerText = activeScore || "";
          document.getElementById('overs').innerText = activeOver ? `(${activeOver} ov)` : "";
          document.getElementById('equation').innerText = targetText || "";
        }

      } catch (err) {
        // Fail completely silently if connection is disrupted
      }
    }

    refreshScore();
    setInterval(refreshScore, 4000); // Check for real-time live runs updates every 4 seconds
  </script>
</body>
</html>
