<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cricket Stream Overlay</title>
  <style>
    body, html {
      margin: 0; padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .scoreboard-strip {
      position: absolute;
      bottom: 25px;
      left: 25px;
      display: flex;
      align-items: center;
      background: rgba(15, 23, 42, 0.95);
      color: #ffffff;
      border-radius: 4px;
      padding: 10px 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
      border-left: 5px solid #eab308;
    }
    .team {
      font-weight: 800;
      font-size: 18px;
      margin-right: 15px;
      letter-spacing: 0.5px;
    }
    .score {
      font-weight: 800;
      font-size: 24px;
      color: #eab308;
    }
    .overs {
      font-size: 16px;
      color: #94a3b8;
      margin-left: 10px;
    }
    .equation {
      font-size: 14px;
      color: #f87171;
      margin-left: 15px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="scoreboard-strip">
    <div id="team" class="team"></div>
    <div id="score" class="score"></div>
    <div id="overs" class="overs"></div>
    <div id="equation" class="equation"></div>
  </div>

  <script>
    async function refreshScore() {
      try {
        const res = await fetch('/api/get-score');
        const data = await res.json();
        
        document.getElementById('team').innerText = data.battingTeam || "";
        document.getElementById('score').innerText = data.score || "";
        document.getElementById('overs').innerText = data.overs || "";
        document.getElementById('equation').innerText = data.target || "";
      } catch (err) {
        // Left completely blank to drop update failures silently
      }
    }

    refreshScore();
    setInterval(refreshScore, 4000);
  </script>
</body>
</html>
